# =============================================================================
# config.yaml  —  User configuration for lsf_nyquist.py
# =============================================================================
#
# All user-adjustable inputs live here.  Edit this file to point the code at
# your own data, change detector parameters, or tweak the FFT settings.
# The Python script reads this file automatically on startup.
#
# YAML syntax in 5 seconds:
#   key: value        →  set a parameter
#   # comment         →  ignored by the code
#   units are NOT enforced by YAML — read the comments!
# =============================================================================


# -----------------------------------------------------------------------------
# DATA  — where are the Zemax PSF files?
# -----------------------------------------------------------------------------

# Path to a *single* PSF file used for the detailed demo figures (Fig. 1–3).
# Format: VROOMM-style Zemax ASCII Image Analysis export (80×80, 17-line header)
example_file: VROOMM_v04_rectangular_fiber/R1553.txt

# Folder that contains the full set of PSFs for the batch summary (Fig. 4).
# The folder must contain:
#   • one or more  R{order}{field}.txt  files  (e.g. R1553.txt = order 155, field 3)
#   • exactly one  *_XY.txt  companion file with columns: order  wavelength_µm  x_mm  y_mm
data_dir: VROOMM_v04_rectangular_fiber


# -----------------------------------------------------------------------------
# DETECTOR GEOMETRY  — real detector pixel size
# -----------------------------------------------------------------------------

# Physical size of one real detector pixel in micrometres (µm).
# For a typical near-IR spectrograph detector: 15 µm.
# For the VROOMM v04 design:                  12 µm.
detector_pixel_um: 12.0


# -----------------------------------------------------------------------------
# ZEMAX SIMULATION GEOMETRY  — sim pixel size
# -----------------------------------------------------------------------------

# Physical size of one Zemax simulation pixel in micrometres (µm).
# This is set by Zemax when the PSF map is exported:
#   sim_pixel_um = image_field_width_mm / n_pixels × 1000
# For VROOMM v04:
#   field width = 0.24 mm,  n_pixels = 80  →  0.24/80 × 1000 = 3.0 µm
#
# The oversampling factor is computed automatically:
#   oversample = detector_pixel_um / sim_pixel_um  (should be a whole number)
sim_pixel_um: 3.0

# Number of header lines in each Zemax ASCII file to skip before the data.
# Count the lines above the first row of numbers in any .txt file.
# (The header contains file path, date, field/image width, pixel count, etc.)
zemax_header_lines: 17


# -----------------------------------------------------------------------------
# FFT SETTINGS  — controls smooth curves in Figs. 2–3
# -----------------------------------------------------------------------------

# Zero-padding length for the FFT used in the power-spectrum plots.
#   • Must be >= number of sim pixels across the PSF (typically 80).
#   • Higher values give smoother curves but take longer.
#   • Powers of 2 (128, 256, 512, 1024) are fastest due to the FFT algorithm.
#   • 512 is a good default — you rarely need more than 1024.
n_fft: 512


# -----------------------------------------------------------------------------
# OUTPUT  — where to write the PNG figures
# -----------------------------------------------------------------------------

# Directory where the four output PNG files will be saved.
# Use  .  for the current working directory (same folder as the script).
# The directory will be created if it does not already exist.
output_dir: .


# -----------------------------------------------------------------------------
# PSF MODEL  — fit a smooth parametric model to the noisy Monte-Carlo PSF
# -----------------------------------------------------------------------------
#
# WHY: Zemax PSF maps are produced by a Monte-Carlo simulation.  The
#      noise in the map adds spurious high-frequency content that inflates
#      the estimated aliased-power fraction.  Fitting a smooth model first
#      removes that bias before the FFT analysis.
#
# WHAT: The model is a sheared + rotated rectangle convolved with a
#       2-D rotated Gaussian.  Nine free parameters are fitted with
#       Nelder-Mead.  The model PSF is then used for ALL downstream
#       analysis instead of the raw Monte-Carlo map.
#
# CACHE: fitted models are saved as FITS files so re-running the script
#        is fast.  Set  refit: true  to force a fresh fit of every PSF.

psf_model:
  enabled: true          # true = use smooth model; false = use raw PSF
  type: rectangle        # only "rectangle" is implemented
  cache_dir: psf_models  # folder for FITS cache files (created automatically)
  refit: false           # true = ignore cache and refit every PSF
